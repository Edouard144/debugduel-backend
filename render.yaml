services:
  - type: web
    name: debugduel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: daphne core.asgi:application --port $PORT --bind 0.0.0.0
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: debugduel-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: WEBHOOK_URL
        value: ""

databases:
  - name: debugduel-db
    plan: free
    databaseName: debugduel
    user: debugduel
